<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>카푸치노 만들기</title>
    <style>
      .container {
        border: 2px solid #c0a080;
        width: 400px;
        padding: 20px;
        margin: 20px;
      }

      h3 {
        text-align: center;
      }

      ol {
        list-style-type: none;
        padding-left: 0;
      }

      li {
        display: flex;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      .num {
        font-size: 40px;
        font-weight: bold;
        color: #7eb12d;
        margin-right: 15px;
        min-width: 40px;

        transform: italic;
        display: inline-block;
      }

      .num-skew {
        transform: skew(-15deg);
      }

      .content {
        font-size: 14px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <h2>카푸치노</h2>
    <hr />
    <div class="container">
      <h3>카푸치노 만드는 순서</h3>
      <hr />
      <ol>
        <li>
          <span class="num num-skew">1.</span>
          <span class="content"
            >에스프레소를 추출한다. 반드시 에스프레소 콩을 사용해야 제맛이
            난다.</span
          >
        </li>
        <li>
          <span class="num num-skew">2.</span>
          <span class="content"
            >적당한 용기에 우유를 넣어 중탕을 하거나 끓기 직전까지 데운다.</span
          >
        </li>
        <li>
          <span class="num num-skew">3.</span>
          <span class="content"
            >몇초간 저어 충분히 거품을 낸다. 거품이 충분하지 않으면 풍미가
            떨어진다.</span
          >
        </li>
        <li>
          <span class="num num-skew">4.</span>
          <span class="content"
            >컵에 계피 막대를 꽂고 커피를 부은후 우유 거품을 붓는다. 휘핑크림을
            얹고 계피가루를 뿌린다.</span
          >
        </li>
      </ol>
    </div>
  </body>
</html>
