<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>연습문제</title>
    <style>
      h3 {
        position: relative;
        left: 10%;
        width: 60%;

        padding: 5px;
        border: 4px double black;
        text-align: center;

        transition:
          background 0.5s,
          border-color 0.5s;
      }

      h3:hover {
        background: aliceblue;
        border-color: yellowgreen;
      }

      .right-img {
        float: right;
        margin-right: 10px;

        padding: 5px;
        border: 1px solid gray;
        border-radius: 10px;

        transition:
          transform 0.5s,
          border-radius 0.5s;
      }

      .right-img:hover {
        transform: scale(1.5);
        border-radius: 30px;
      }

      p {
        clear: both;
      }
    </style>
  </head>
  <body>
    <h3>5G (Wikipedia)</h3>

    <img src="5g.png" class="right-img" width="100" alt="5G 이미지" />

    <p>
      5G networks are cellular networks, in which the service area is divided
      into small geographical areas called cells...
    </p>
  </body>
</html>
