<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>문서구조화</title>
    <style>
      #wrapper {
        width: 600px;
      }

      header {
        height: 120px;
        background: blue;
      }
      header h1 {
        color: white;
        padding: 10px 0 0 20px;
        margin: 0;
      }
      header h5 {
        color: white;
        padding-left: 20px;
        margin: 0;
      }

      nav {
        width: 580px;
        height: 40px;
        background: skyblue;
        margin-left: 20px;
      }
      nav ul {
        margin: 0;
        padding: 0;
      }
      nav li {
        float: left;
        list-style-type: none;
        padding: 10px 15px;
      }

      aside {
        width: 200px;
        height: 230px;
        background: #666;
        float: right;
        margin-top: 10px;
      }
      aside h3 {
        color: #fff;
        padding: 10px 0 0 10px;
        margin: 0;
      }
      aside article {
        width: 200px;
        background: #666;
        color: white;
        padding: 10px;
      }

      section {
        width: 400px;
        background: #fff;
        border: 2px solid black;
        margin-top: 24px;
      }
      section article {
        width: 400px;
        background: #ccc;
      }
      section h2 {
        padding: 5px 0 0 10px;
        margin: 0;
      }
      section p {
        padding: 5px;
        margin: 0;
      }

      hr {
        width: 380px;
        margin: 10px auto;
      }

      footer {
        clear: both;
        height: 40px;
        background: darkcyan;
        margin-top: 15px;
      }
      footer p {
        color: white;
        padding: 10px 0 0 10px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <header>
        <h1>header</h1>
        <h5>header의 두번째 제목입니다.</h5>
      </header>

      <nav>
        <ul>
          <li>메뉴 1</li>
          <li>메뉴 2</li>
          <li>메뉴 3</li>
          <li>메뉴 4</li>
          <li>메뉴 5</li>
        </ul>
      </nav>

      <aside>
        <h3>aside</h3>
        <article>aside의 본문입니다.</article>
      </aside>

      <section>
        <article>
          <h2>article 1</h2>
          <p>article 1의 본문입니다.</p>
        </article>

        <hr />

        <article>
          <h2>article 2</h2>
          <p>article 2의 본문입니다.</p>
        </article>
      </section>

      <footer>
        <p>footer</p>
      </footer>
    </div>
  </body>
</html>
