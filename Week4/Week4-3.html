<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>:hover 활용</title>
    <style>
      .container {
        display: flex; 
        align-items: center;
        gap: 20px;
      }

      .card-box {
        width: 150px;
        height: 210px;
        border: 1px solid #ccc;

        background-image: url("blank.png");
        background-size: cover;
      }
      .card-box:hover {
        background-image: url("woori.png");
      }
    </style>
  </head>
  <body>
    <h2>:hover 활용</h2>
    <hr />

    <div class="container">
      <p>마우스를 올리면 카드의 앞면이 보인다.</p>

      <div class="card-box"></div>
    </div>
  </body>
</html>
