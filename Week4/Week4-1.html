<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>색 테이블 만들기</title>
    <style>
      table {
        border: 1px solid black;
      }
      th,
      td {
        border: 1px solid black;
      }
      .color-cell {
        width: 80px;
      }
    </style>
  </head>
  <body>
    <h2>색 이름과 코드</h2>
    <hr />

    <table>
      <thead>
        <tr>
          <th>이름</th>
          <th>코드</th>
          <th>색</th>
          <th>이름</th>
          <th>코드</th>
          <th>색</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Brown</td>
          <td>#A52A2A</td>
          <td class="color-cell" style="background-color: #a52a2a"></td>
          <td>DeepSkyBlue</td>
          <td>#00BFFF</td>
          <td class="color-cell" style="background-color: #00bfff"></td>
        </tr>
        <tr>
          <td>Blueviolet</td>
          <td>#8A2BE2</td>
          <td class="color-cell" style="background-color: #8a2be2"></td>
          <td>Gold</td>
          <td>#FFD700</td>
          <td class="color-cell" style="background-color: #ffd700"></td>
        </tr>
        <tr>
          <td>DarkOrange</td>
          <td>#FF8C00</td>
          <td class="color-cell" style="background-color: #ff8c00"></td>
          <td>OliveDrab</td>
          <td>#6B8E23</td>
          <td class="color-cell" style="background-color: #6b8e23"></td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
