<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>랜덤 색 만들기</title>
    <style>
      div {
        display: inline-block;
        width: 150px;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h3>3개의 랜덤한 색 만들기</h3>
    <hr />
    <script>
      for (var i = 0; i < 3; i++) {
        var r = Math.floor(Math.random() * 256);
        var g = Math.floor(Math.random() * 256);
        var b = Math.floor(Math.random() * 256);

        var color = "rgb(" + r + "," + g + "," + b + ")";

        document.write(
          "<div style='background-color:" + color + "'>" + color + "</div>",
        );
      }
    </script>
  </body>
</html>
