<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>document.write() 활용</title>
  </head>
  <body>
    <script>
      for (var i = 1; i <= 5; i++) {
        for (var j = 0; j < i; j++) {
          document.write("*");
        }
        document.write("<br>");
      }
    </script>
  </body>
</html>
