<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>테이블 그리기</title>
    <style>
      table {
        border: 1px solid black;
      }

      td {
        border: 1px solid black;
        width: 50px;
        height: 30px;
      }
    </style>
  </head>
  <body>
    <script>
      var row = prompt("행을 입력하세요", "");

      var col = prompt("열을 입력하세요", "");

      var r = parseInt(row);
      var c = parseInt(col);

      document.write("<table>");
      for (var i = 0; i < r; i++) {
        document.write("<tr>");
        for (var j = 0; j < c; j++) {
          document.write("<td>&nbsp;</td>");
        }
        document.write("</tr>");
      }
      document.write("</table>");
    </script>
  </body>
</html>
